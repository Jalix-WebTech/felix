<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./Assests/style.css">
  <title>James Felix | Birthday</title>
</head>
<body>

  <!-- background Video -->
  <video  autoplay muted loop playsinline class="bg-video">
      <source src="./Assests/video/rose.mp4" type="video/mp4">
      your browser does not support the video tag.
  </video>

  <!-- Overlay -->

  <div class="video-overlay"></div>
  <main>
          <div id="header">
              <h2 class="bday-title">James Felix's Birthday 🎉 is coming soon </h2>
              <img class="Celebrant" src="./Assests/Celebrant.jpg" alt="James Felix Image">
              <h2 class="bday-age">I'll soon be +1</h2>
              <h3 class="bday-date">12th June, 2026</h3>
          </div>
    


      <div id="gift-section">
          <h2 id="gift-title">Here's how happy I'll be on my birthday 🥳🎈🎈</h2>
          <p id="desktop-text">(hover over the gift)</p>
          <p id="mobile-text">(Click the gift)</p>
          <div class="gift-img"></div>        
      </div>

      <div class="countdown-container">
          <h1>Save the date for the celebratoin 🎉🍾🍻🥂</h1>
          <p id="countdown">I 💜 U</p>
      </div>
  </main>

  <script src="./Assests/script.js"></script>
</body>
</html>
